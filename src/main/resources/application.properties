# ============================================================
# Project IP Management Dashboard – Production Configuration
# Database: Neon PostgreSQL
# ============================================================

# ----------------------------------------------------------
# Server
# ----------------------------------------------------------
server.port=${PORT:8080}

# ----------------------------------------------------------
# Datasource
# ----------------------------------------------------------
spring.datasource.url=jdbc:postgresql://ep-damp-cloud-a171s1qg.ap-southeast-1.aws.neon.tech/neondb?sslmode=require

spring.datasource.username=neondb_owner
spring.datasource.password=npg_rvoUt6N2Lswn

spring.datasource.driver-class-name=org.postgresql.Driver

# Connection stability (IMPORTANT for Railway)
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.auto-commit=true

# ----------------------------------------------------------
# JPA / Hibernate
# ----------------------------------------------------------

# Use update for first deploy (later change to none)
spring.jpa.hibernate.ddl-auto=update

spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# Prevent LOB crash issue
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# ----------------------------------------------------------
# Thymeleaf
# ----------------------------------------------------------
spring.thymeleaf.cache=true

# ----------------------------------------------------------
# Application
# ----------------------------------------------------------
spring.application.name=TTdashboard

# ----------------------------------------------------------
# Logging (helps debugging crashes)
# ----------------------------------------------------------
logging.level.org.springframework=INFO
logging.level.org.hibernate=ERROR