# ============================================================
#  Project IP Management Dashboard – Application Configuration
#  Database: Neon PostgreSQL
# ============================================================

# ----------------------------------------------------------
# Server
# ----------------------------------------------------------
server.port=${PORT:8080}

# ----------------------------------------------------------
# Datasource
# ----------------------------------------------------------
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://ep-damp-cloud-a171s1qg.ap-southeast-1.aws.neon.tech/neondb?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:neondb_owner}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:npg_rvoUt6N2Lswn}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ----------------------------------------------------------
# JPA / Hibernate
# ----------------------------------------------------------
# Automatically create / update schema on startup
spring.jpa.hibernate.ddl-auto=update

# Log every SQL statement to console (useful during development)
spring.jpa.show-sql=${SPRING_JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.format_sql=true

# ----------------------------------------------------------
# Thymeleaf
# ----------------------------------------------------------
# Disable template caching so changes appear immediately during development
spring.thymeleaf.cache=${SPRING_THYMELEAF_CACHE:true}

# ----------------------------------------------------------
# Application name (shown in Spring Boot banner)
# ----------------------------------------------------------
spring.application.name=TTdashboard
