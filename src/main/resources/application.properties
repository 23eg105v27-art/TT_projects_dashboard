# ============================================================
#  Project IP Management Dashboard – Application Configuration
#  Database: Neon PostgreSQL
# ============================================================

# ----------------------------------------------------------
# Server
# ----------------------------------------------------------
server.port=${PORT:8080}

# ----------------------------------------------------------
# Datasource
# ----------------------------------------------------------
spring.datasource.url=jdbc:postgresql://ep-damp-cloud-a171s1qg.ap-southeast-1.aws.neon.tech/neondb?sslmode=require
spring.datasource.username=neondb_owner
spring.datasource.password=npg_rvoUt6N2Lswn
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=1200000

# ----------------------------------------------------------
# JPA / Hibernate
# ----------------------------------------------------------
# Automatically create / update schema on startup
spring.jpa.hibernate.ddl-auto=update

# Log every SQL statement to console (useful during development)
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ----------------------------------------------------------
# Thymeleaf
# ----------------------------------------------------------
# Disable template caching so changes appear immediately during development
spring.thymeleaf.cache=false

# ----------------------------------------------------------
# Application name (shown in Spring Boot banner)
# ----------------------------------------------------------
spring.application.name=TTdashboard
