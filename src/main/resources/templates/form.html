<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Add New Project - IP Management Dashboard</title>

    <!-- Bootstrap 5 CSS via CDN -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"/>

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
<style>

:root{

--bg-dark:#050816;
--bg-card:rgba(255,255,255,0.04);
--neon:#4f8cff;
--neon2:#00e0ff;
--border:rgba(79,140,255,0.25);
--text:#e6edf3;

}

body{

background:
radial-gradient(circle at 20% 20%,#0b1a35,#050816);

color:var(--text);

font-family:Inter,system-ui;

overflow-x:hidden;

}

/* floating glow background */

body::before{

content:"";

position:fixed;

width:600px;
height:600px;

background:radial-gradient(#4f8cff33,transparent);

filter:blur(120px);

animation:moveGlow 10s infinite alternate;

z-index:-1;

}

@keyframes moveGlow{

from{transform:translate(-100px,-100px);}
to{transform:translate(200px,150px);}

}

/* navbar */

.navbar{

background:rgba(5,8,22,0.7)!important;

backdrop-filter:blur(15px);

border-bottom:1px solid var(--border);

}

.navbar-brand{

color:#4f8cff!important;

font-weight:600;

}

/* card */

.form-card{

background:var(--bg-card);

backdrop-filter:blur(15px);

border-radius:15px;

border:1px solid var(--border);

box-shadow:0 0 30px rgba(79,140,255,0.15);

transition:.3s;

}

.form-card:hover{

transform:translateY(-5px);

box-shadow:0 0 60px rgba(79,140,255,0.35);

}

/* section titles */

.section-title{

color:var(--neon);

font-weight:600;

margin-bottom:10px;

}

/* divider */

.section-divider{

border-color:#1f2a44;

}

/* inputs */

.form-control,
.form-select{

background:#0b1220;

border:1px solid #1f2a44;

color:white;

border-radius:8px;

padding:10px;

}

.form-control::placeholder{

color:#7c8aa5;

}

.form-control:focus,
.form-select:focus{

border-color:var(--neon);

box-shadow:0 0 15px var(--neon);

background:#0b1220;

color:white;

outline:none;

}

/* labels */

.form-label{

color:#9fb3c8;

font-weight:500;

}

/* buttons */

.btn{

border-radius:8px;

transition:.25s;

}

/* primary gradient button */

.btn-success{

background:linear-gradient(135deg,var(--neon),var(--neon2));

border:none;

font-weight:600;

}

.btn-success:hover{

box-shadow:0 0 20px var(--neon);

transform:translateY(-2px);

}

/* secondary button */

.btn-outline-secondary{

border:1px solid var(--neon);

color:var(--neon);

background:transparent;

}

.btn-outline-secondary:hover{

background:var(--neon);

color:white;

}

/* table glow (dashboard page) */

table{

background:rgba(255,255,255,0.03);

border-radius:10px;

overflow:hidden;

}

th{

background:#0b1220;

color:var(--neon);

border-bottom:1px solid var(--border);

}

td{

border-bottom:1px solid #1f2a44;

}

/* row hover */

tr{

transition:.25s;

}

tr:hover{

background:rgba(79,140,255,0.08);

box-shadow:0 0 10px rgba(79,140,255,0.2);

}

/* animations */

*{

transition:.25s;

}

</style>
</head>
<body>

    <!-- ====== Dark Navigation Bar ====== -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-hdd-network-fill me-2 text-success"></i>
                IP Management Dashboard
            </a>
            <div class="ms-auto">
                <a href="/dashboard" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-table me-1"></i> View Dashboard
                </a>
            </div>
        </div>
    </nav>

    <!-- ====== Form Card ====== -->
    <div class="container-fluid px-3 px-md-4 py-5">
        <div class="row justify-content-center">
            <div class="col-12 form-shell">

                <div class="card form-card">

                    <!-- Card Header -->
                    <div class="card-header card-header-custom py-3">
                        <h4 class="text-white mb-0">
                            <i class="bi bi-plus-circle-fill me-2 text-success"></i>
                            Add New Project
                        </h4>
                        <small class="text-secondary">Fill in the project details below</small>
                    </div>

                    <!-- Card Body -->
                    <div class="card-body p-4">

                        <!--
                            th:action is the POST endpoint.
                            th:object binds the form to the Project model attribute.
                        -->
                        <form th:action="@{/save}" th:object="${project}" method="post" novalidate>

                            <div class="form-section">
                                <h6 class="section-title">
                                    <i class="bi bi-person-badge me-1"></i> Student Information
                                </h6>
                                <hr class="section-divider"/>
                                <div class="responsive-grid grid-cols-1 md:grid-cols-2 gap-4 gap-6">
                                <div>
                                    <label for="rollNumber" class="form-label">
                                        <i class="bi bi-123 me-1 text-primary"></i>
                                        Roll Number <span class="text-danger">*</span>
                                    </label>
                                    <input
                                        type="text"
                                        id="rollNumber"
                                        th:field="*{rollNumber}"
                                        th:classappend="${#fields.hasErrors('rollNumber')} ? 'is-invalid' : ''"
                                        class="form-control w-full"
                                        placeholder="Example: 23EG105V27"
                                        required/>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('rollNumber')}" th:errors="*{rollNumber}"></div>
                                </div>

                                <div>
                                    <label for="studentName" class="form-label">
                                        <i class="bi bi-person-vcard me-1 text-success"></i>
                                        Student Name <span class="text-danger">*</span>
                                    </label>
                                    <input
                                        type="text"
                                        id="studentName"
                                        th:field="*{studentName}"
                                        th:classappend="${#fields.hasErrors('studentName')} ? 'is-invalid' : ''"
                                        class="form-control w-full"
                                        placeholder="e.g. Alex Martin"
                                        required/>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('studentName')}" th:errors="*{studentName}"></div>
                                </div>

                                <div>
                                    <label for="section" class="form-label">
                                        <i class="bi bi-diagram-3 me-1 text-primary"></i>
                                        Section <span class="text-danger">*</span>
                                    </label>
                                    <input
                                        type="text"
                                        id="section"
                                        th:field="*{section}"
                                        th:classappend="${#fields.hasErrors('section')} ? 'is-invalid' : ''"
                                        class="form-control w-full"
                                        placeholder="Example: CSE-A"
                                        required/>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('section')}" th:errors="*{section}"></div>
                                </div>

                                <div>
                                    <label for="year" class="form-label">
                                        <i class="bi bi-calendar3 me-1 text-primary"></i>
                                        Studying Year <span class="text-danger">*</span>
                                    </label>
                                    <select
                                        id="year"
                                        th:field="*{year}"
                                        th:classappend="${#fields.hasErrors('year')} ? 'is-invalid' : ''"
                                        class="form-select w-full"
                                        required>
                                        <option value="">Select year</option>
                                        <option value="I Year">I Year</option>
                                        <option value="II Year">II Year</option>
                                        <option value="III Year">III Year</option>
                                        <option value="IV Year">IV Year</option>
                                    </select>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('year')}" th:errors="*{year}"></div>
                                </div>
                                </div>
                            </div>

                            <div class="form-section">
                                <h6 class="section-title">
                                    <i class="bi bi-folder2-open me-1"></i> Project Information
                                </h6>
                                <hr class="section-divider"/>
                                <div class="responsive-grid grid-cols-1 md:grid-cols-2 gap-4 gap-6">
                                <div>
                                    <label for="name" class="form-label">
                                        <i class="bi bi-folder2-open me-1 text-primary"></i>
                                        Project Name <span class="text-danger">*</span>
                                    </label>
                                    <input
                                        type="text"
                                        id="name"
                                        th:field="*{name}"
                                        th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                                        class="form-control w-full"
                                        placeholder="e.g. E-Commerce Platform"
                                        required/>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                                </div>

                                <div>
                                    <label for="abstractText" class="form-label">
                                        <i class="bi bi-file-text me-1 text-secondary"></i>
                                        Project Abstract <span class="text-danger">*</span>
                                    </label>
                                    <textarea
                                        id="abstractText"
                                        th:field="*{abstractText}"
                                        th:classappend="${#fields.hasErrors('abstractText')} ? 'is-invalid' : ''"
                                        class="form-control w-full"
                                        rows="4"
                                        placeholder="Brief description of the project..."
                                        required></textarea>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('abstractText')}" th:errors="*{abstractText}"></div>
                                </div>
                                </div>
                            </div>

                            <div class="form-section">
                                <h6 class="section-title">
                                    <i class="bi bi-hdd-network me-1"></i> Network Information
                                </h6>
                                <hr class="section-divider"/>
                                <div class="responsive-grid grid-cols-1 md:grid-cols-2 gap-4 gap-6">
                                <div>
                                    <label for="frontendIp" class="form-label">
                                        <i class="bi bi-pc-display me-1 text-info"></i>
                                        Frontend IP Address <span class="text-danger">*</span>
                                    </label>
                                    <input
                                        type="text"
                                        id="frontendIp"
                                        th:field="*{frontendIp}"
                                        th:classappend="${#fields.hasErrors('frontendIp')} ? 'is-invalid' : ''"
                                        class="form-control w-full"
                                        placeholder="e.g. 192.168.1.10"
                                        required/>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('frontendIp')}" th:errors="*{frontendIp}"></div>
                                </div>

                                <div>
                                    <label for="backendIp" class="form-label">
                                        <i class="bi bi-server me-1 text-warning"></i>
                                        Backend IP Address <span class="text-danger">*</span>
                                    </label>
                                    <input
                                        type="text"
                                        id="backendIp"
                                        th:field="*{backendIp}"
                                        th:classappend="${#fields.hasErrors('backendIp')} ? 'is-invalid' : ''"
                                        class="form-control w-full"
                                        placeholder="e.g. 10.0.0.5"
                                        required/>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('backendIp')}" th:errors="*{backendIp}"></div>
                                </div>
                                </div>
                            </div>

                            <div class="form-section">
                                <h6 class="section-title">
                                    <i class="bi bi-github me-1"></i> Repository
                                </h6>
                                <hr class="section-divider"/>
                                <div class="responsive-grid grid-cols-1 md:grid-cols-2 gap-4 gap-6">
                                <div>
                                    <label for="githubRepo" class="form-label">
                                        <i class="bi bi-github me-1 text-dark"></i>
                                        GitHub Repo Link <span class="text-danger">*</span>
                                    </label>
                                    <input
                                        type="url"
                                        id="githubRepo"
                                        th:field="*{githubRepo}"
                                        th:classappend="${#fields.hasErrors('githubRepo')} ? 'is-invalid' : ''"
                                        class="form-control w-full"
                                        placeholder="https://github.com/user/repository"
                                        required/>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('githubRepo')}" th:errors="*{githubRepo}"></div>
                                </div>
                                </div>
                            </div>

                            <!-- Submit & Reset -->
                            <div class="mt-4 d-flex gap-3">
                                <button type="submit" class="btn btn-success">
                                    Submit
                                </button>
                                <button type="reset" class="btn btn-outline-secondary">
                                    Clear
                                </button>
                            </div>

                        </form>
                    </div><!-- /card-body -->

                </div><!-- /card -->
            </div><!-- /col -->
        </div><!-- /row -->
    </div><!-- /container -->

    <!-- Bootstrap 5 JS Bundle -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmQ7MjIasN4ue0UGb7FrZIPRTOEi"
        crossorigin="anonymous">
    </script>
</body>
</html>
