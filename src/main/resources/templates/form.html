<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Add New Project - IP Management Dashboard</title>

    <!-- Bootstrap 5 CSS via CDN -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
        crossorigin="anonymous"/>

    <!-- Bootstrap Icons -->
    <link
        rel="stylesheet"
        href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>

    <style>
        :root {
            --page-gradient: linear-gradient(135deg, #f0f8ff, #e4f1ff, #d0e8ff);
            --accent-gradient: linear-gradient(135deg, #38bdf8, #0ea5e9);
            --success-gradient: linear-gradient(135deg, #16A34A, #22C55E);
            --card-glass: rgba(255, 255, 255, 0.84);
            --border-glass: rgba(59, 130, 246, 0.45);
            --text-primary: #0f172a;
            --text-secondary: #334155;
        }
        * {
            transition: all .2s ease;
        }
        body {
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            position: relative;
            overflow-x: hidden;
            background: var(--page-gradient);
            background-size: 220% 220%;
            animation: bgShift 18s ease infinite;
            color: var(--text-primary);
        }
        body::before,
        body::after {
            content: "";
            position: fixed;
            width: 400px;
            height: 400px;
            border-radius: 999px;
            filter: blur(56px);
            z-index: -1;
            opacity: 0.62;
            pointer-events: none;
            animation: pulseGlow 11s ease-in-out infinite;
        }
        body::before {
            top: -70px;
            left: -60px;
            background: radial-gradient(circle, #4facfe 0%, #93c5fd 70%, transparent 100%);
        }
        body::after {
            right: -80px;
            bottom: -90px;
            background: radial-gradient(circle, #00c6ff 0%, #bfdbfe 65%, transparent 100%);
            animation-delay: 2s;
        }
        @keyframes bgShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        @keyframes pulseGlow {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.12); }
        }
        @keyframes cardSheen {
            0%, 70%, 100% { transform: translateX(0) rotate(18deg); }
            35% { transform: translateX(360%) rotate(18deg); }
        }
        @keyframes inputSheen {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        .navbar {
            background: rgba(255, 255, 255, 0.64) !important;
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border-glass);
            box-shadow: 0 10px 34px rgba(59, 130, 246, 0.2);
        }
        .navbar .navbar-brand,
        .navbar .btn,
        .navbar .btn:hover {
            color: var(--text-primary);
        }
        .navbar .navbar-brand,
        .navbar .btn {
            position: relative;
        }
        .navbar .navbar-brand::after,
        .navbar .btn::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: -4px;
            width: 100%;
            height: 2px;
            background: var(--accent-gradient);
            transform: scaleX(0);
            transform-origin: left;
            transition: transform .25s ease;
        }
        .navbar .navbar-brand:hover::after,
        .navbar .btn:hover::after {
            transform: scaleX(1);
        }
        .form-card {
            position: relative;
            background: var(--card-glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-radius: 16px;
            box-shadow: 0 14px 50px rgba(59, 130, 246, 0.22);
            border: 1px solid var(--border-glass);
            transition: .3s;
            overflow: hidden;
        }
        .form-card::before {
            content: "";
            position: absolute;
            top: -140%;
            left: -45%;
            width: 55%;
            height: 320%;
            background: linear-gradient(120deg, transparent 0%, rgba(255, 255, 255, 0.35) 48%, transparent 100%);
            transform: rotate(18deg);
            pointer-events: none;
            animation: cardSheen 11s ease-in-out infinite;
            opacity: 0.72;
        }
        .form-card:hover {
            transform: translateY(-6px) scale(1.01);
            box-shadow: 0 20px 56px rgba(59, 130, 246, 0.32);
        }
        .card-header-custom {
            background: linear-gradient(135deg, #e6f2ff, #cfe9ff, #b8dcff);
            border-radius: 16px 16px 0 0;
            border-bottom: 1px solid var(--border-glass);
        }
        .form-label {
            font-weight: 600;
            color: var(--text-secondary);
        }
        .form-control,
        .form-select {
            border-radius: 10px;
            border: 1px solid var(--border-glass);
            padding: 10px;
            background: rgba(255, 255, 255, 0.78);
            color: var(--text-primary);
            background-image: linear-gradient(100deg, rgba(255,255,255,0.96), rgba(191,219,254,0.72), rgba(255,255,255,0.96));
            background-size: 220% 220%;
            animation: inputSheen 14s ease-in-out infinite;
        }
        .form-control::placeholder {
            color: #64748b;
            opacity: 0.9;
        }
        .form-control:focus,
        .form-select:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 26px rgba(59,130,246,0.45);
            outline: none;
        }
        .btn {
            border-radius: 10px;
            transition: .35s;
            border: none;
        }
        .btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 0 30px rgba(59,130,246,0.5);
        }
        .btn:active {
            transform: scale(.97);
        }
        .btn-submit {
            background: var(--success-gradient);
            font-weight: 700;
            letter-spacing: 0.3px;
            padding: 10px 30px;
        }
        .btn-submit:hover {
            background: linear-gradient(135deg, #15803D, #16A34A);
        }
        .btn-outline-light {
            border-color: var(--border-glass);
            border-width: 1px;
            background: rgba(255,255,255,0.5);
        }
        .btn-outline-light:hover {
            background-color: #eaf2ff;
            border-color: #60a5fa;
            color: var(--text-primary);
        }
        .btn-outline-secondary {
            background: rgba(255,255,255,0.88);
            border: 1px solid var(--border-glass);
            color: #334155;
        }
        .btn-outline-secondary:hover {
            background: #eaf2ff;
            border-color: #60a5fa;
            color: #0F172A;
        }
        .invalid-feedback {
            font-size: 0.84rem;
        }
        h4.text-white,
        .card-header small {
            color: var(--text-primary) !important;
        }
        .form-shell {
            max-width: 900px;
            margin: 0 auto;
            transition: all .3s ease;
        }
        .card-body {
            padding: 1.1rem !important;
        }
        .form-section {
            padding: 0.75rem 0;
            transition: all .3s ease;
        }
        .section-title {
            margin-bottom: 0.9rem;
            font-weight: 700;
            color: var(--text-primary);
            letter-spacing: 0.2px;
        }
        .section-divider {
            border: 0;
            border-top: 1px solid var(--border-glass);
            margin: 0.25rem 0 0.85rem;
        }
        .responsive-grid {
            display: grid;
            grid-template-columns: repeat(1, minmax(0, 1fr));
            gap: 1rem;
        }
        .grid-cols-1 {
            grid-template-columns: repeat(1, minmax(0, 1fr));
        }
        .gap-4 {
            gap: 1rem;
        }
        .gap-6 {
            gap: 1rem;
        }
        .w-full {
            width: 100%;
        }
        .form-actions {
            display: flex;
            flex-direction: column;
            gap: 0.7rem;
            margin-top: 1.1rem;
        }
        .form-actions .btn {
            width: 100%;
        }
        #abstractText {
            min-height: clamp(130px, 22vw, 210px);
            resize: vertical;
        }
        @media (min-width: 768px) {
            .md\:grid-cols-2 {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
            .card-body {
                padding: 1.45rem !important;
            }
            .form-actions {
                flex-direction: row;
                gap: 0.75rem;
            }
            .form-actions .btn {
                width: auto;
            }
        }
        @media (min-width: 992px) {
            .gap-6 {
                gap: 1.5rem;
            }
        }
    </style>
</head>
<body>

    <!-- ====== Dark Navigation Bar ====== -->
    <nav class="navbar navbar-expand-lg navbar-dark">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">
                <i class="bi bi-hdd-network-fill me-2 text-success"></i>
                IP Management Dashboard
            </a>
            <div class="ms-auto">
                <a href="/dashboard" class="btn btn-outline-light btn-sm">
                    <i class="bi bi-table me-1"></i> View Dashboard
                </a>
            </div>
        </div>
    </nav>

    <!-- ====== Form Card ====== -->
    <div class="container-fluid px-3 px-md-4 py-5">
        <div class="row justify-content-center">
            <div class="col-12 form-shell">

                <div class="card form-card">

                    <!-- Card Header -->
                    <div class="card-header card-header-custom py-3">
                        <h4 class="text-white mb-0">
                            <i class="bi bi-plus-circle-fill me-2 text-success"></i>
                            Add New Project
                        </h4>
                        <small class="text-secondary">Fill in the project details below</small>
                    </div>

                    <!-- Card Body -->
                    <div class="card-body p-4">

                        <!--
                            th:action is the POST endpoint.
                            th:object binds the form to the Project model attribute.
                        -->
                        <form th:action="@{/save}" th:object="${project}" method="post" novalidate>

                            <div class="form-section">
                                <h6 class="section-title">
                                    <i class="bi bi-person-badge me-1"></i> Student Information
                                </h6>
                                <hr class="section-divider"/>
                                <div class="responsive-grid grid-cols-1 md:grid-cols-2 gap-4 gap-6">
                                <div>
                                    <label for="rollNumber" class="form-label">
                                        <i class="bi bi-123 me-1 text-primary"></i>
                                        Roll Number <span class="text-danger">*</span>
                                    </label>
                                    <input
                                        type="text"
                                        id="rollNumber"
                                        th:field="*{rollNumber}"
                                        th:classappend="${#fields.hasErrors('rollNumber')} ? 'is-invalid' : ''"
                                        class="form-control w-full"
                                        placeholder="Example: 23EG105V27"
                                        required/>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('rollNumber')}" th:errors="*{rollNumber}"></div>
                                </div>

                                <div>
                                    <label for="studentName" class="form-label">
                                        <i class="bi bi-person-vcard me-1 text-success"></i>
                                        Student Name <span class="text-danger">*</span>
                                    </label>
                                    <input
                                        type="text"
                                        id="studentName"
                                        th:field="*{studentName}"
                                        th:classappend="${#fields.hasErrors('studentName')} ? 'is-invalid' : ''"
                                        class="form-control w-full"
                                        placeholder="e.g. Alex Martin"
                                        required/>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('studentName')}" th:errors="*{studentName}"></div>
                                </div>

                                <div>
                                    <label for="section" class="form-label">
                                        <i class="bi bi-diagram-3 me-1 text-primary"></i>
                                        Section <span class="text-danger">*</span>
                                    </label>
                                    <input
                                        type="text"
                                        id="section"
                                        th:field="*{section}"
                                        th:classappend="${#fields.hasErrors('section')} ? 'is-invalid' : ''"
                                        class="form-control w-full"
                                        placeholder="Example: CSE-A"
                                        required/>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('section')}" th:errors="*{section}"></div>
                                </div>

                                <div>
                                    <label for="year" class="form-label">
                                        <i class="bi bi-calendar3 me-1 text-primary"></i>
                                        Studying Year <span class="text-danger">*</span>
                                    </label>
                                    <select
                                        id="year"
                                        th:field="*{year}"
                                        th:classappend="${#fields.hasErrors('year')} ? 'is-invalid' : ''"
                                        class="form-select w-full"
                                        required>
                                        <option value="">Select year</option>
                                        <option value="I Year">I Year</option>
                                        <option value="II Year">II Year</option>
                                        <option value="III Year">III Year</option>
                                        <option value="IV Year">IV Year</option>
                                    </select>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('year')}" th:errors="*{year}"></div>
                                </div>
                                </div>
                            </div>

                            <div class="form-section">
                                <h6 class="section-title">
                                    <i class="bi bi-folder2-open me-1"></i> Project Information
                                </h6>
                                <hr class="section-divider"/>
                                <div class="responsive-grid grid-cols-1 md:grid-cols-2 gap-4 gap-6">
                                <div>
                                    <label for="name" class="form-label">
                                        <i class="bi bi-folder2-open me-1 text-primary"></i>
                                        Project Name <span class="text-danger">*</span>
                                    </label>
                                    <input
                                        type="text"
                                        id="name"
                                        th:field="*{name}"
                                        th:classappend="${#fields.hasErrors('name')} ? 'is-invalid' : ''"
                                        class="form-control w-full"
                                        placeholder="e.g. E-Commerce Platform"
                                        required/>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('name')}" th:errors="*{name}"></div>
                                </div>

                                <div>
                                    <label for="abstractText" class="form-label">
                                        <i class="bi bi-file-text me-1 text-secondary"></i>
                                        Project Abstract <span class="text-danger">*</span>
                                    </label>
                                    <textarea
                                        id="abstractText"
                                        th:field="*{abstractText}"
                                        th:classappend="${#fields.hasErrors('abstractText')} ? 'is-invalid' : ''"
                                        class="form-control w-full"
                                        rows="4"
                                        placeholder="Brief description of the project..."
                                        required></textarea>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('abstractText')}" th:errors="*{abstractText}"></div>
                                </div>
                                </div>
                            </div>

                            <div class="form-section">
                                <h6 class="section-title">
                                    <i class="bi bi-hdd-network me-1"></i> Network Information
                                </h6>
                                <hr class="section-divider"/>
                                <div class="responsive-grid grid-cols-1 md:grid-cols-2 gap-4 gap-6">
                                <div>
                                    <label for="frontendIp" class="form-label">
                                        <i class="bi bi-pc-display me-1 text-info"></i>
                                        Frontend IP Address <span class="text-danger">*</span>
                                    </label>
                                    <input
                                        type="text"
                                        id="frontendIp"
                                        th:field="*{frontendIp}"
                                        th:classappend="${#fields.hasErrors('frontendIp')} ? 'is-invalid' : ''"
                                        class="form-control w-full"
                                        placeholder="e.g. 192.168.1.10"
                                        required/>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('frontendIp')}" th:errors="*{frontendIp}"></div>
                                </div>

                                <div>
                                    <label for="backendIp" class="form-label">
                                        <i class="bi bi-server me-1 text-warning"></i>
                                        Backend IP Address <span class="text-danger">*</span>
                                    </label>
                                    <input
                                        type="text"
                                        id="backendIp"
                                        th:field="*{backendIp}"
                                        th:classappend="${#fields.hasErrors('backendIp')} ? 'is-invalid' : ''"
                                        class="form-control w-full"
                                        placeholder="e.g. 10.0.0.5"
                                        required/>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('backendIp')}" th:errors="*{backendIp}"></div>
                                </div>
                                </div>
                            </div>

                            <div class="form-section">
                                <h6 class="section-title">
                                    <i class="bi bi-github me-1"></i> Repository
                                </h6>
                                <hr class="section-divider"/>
                                <div class="responsive-grid grid-cols-1 md:grid-cols-2 gap-4 gap-6">
                                <div>
                                    <label for="githubRepo" class="form-label">
                                        <i class="bi bi-github me-1 text-dark"></i>
                                        GitHub Repo Link <span class="text-danger">*</span>
                                    </label>
                                    <input
                                        type="url"
                                        id="githubRepo"
                                        th:field="*{githubRepo}"
                                        th:classappend="${#fields.hasErrors('githubRepo')} ? 'is-invalid' : ''"
                                        class="form-control w-full"
                                        placeholder="https://github.com/user/repository"
                                        required/>
                                    <div class="invalid-feedback" th:if="${#fields.hasErrors('githubRepo')}" th:errors="*{githubRepo}"></div>
                                </div>
                                </div>
                            </div>

                            <!-- Submit & Reset -->
                            <div class="mt-4 d-flex gap-3">
                                <button type="submit" class="btn btn-success">
                                    Submit
                                </button>
                                <button type="reset" class="btn btn-outline-secondary">
                                    Clear
                                </button>
                            </div>

                        </form>
                    </div><!-- /card-body -->

                </div><!-- /card -->
            </div><!-- /col -->
        </div><!-- /row -->
    </div><!-- /container -->

    <!-- Bootstrap 5 JS Bundle -->
    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc4s9bIOgUxi8T/jzmQ7MjIasN4ue0UGb7FrZIPRTOEi"
        crossorigin="anonymous">
    </script>
</body>
</html>
